document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

53, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"4529b38c-7da9-45b5-a2d9-7fbf582b1f23\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e2bd8e22-678f-4b24-aef1-7ffcdbaf8e22\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0f499052-fa48-404b-b0cb-f99ec0ed906e\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b15a1f89-8607-4ad3-bd4f-466839f43d23\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b45ac1a9-22a6-491a-8822-ba4326f9adcd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b3121b4c-75b2-4de7-922b-d879ab4e6de4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"9521dc98-be57-4884-bee9-46c46eaf6866\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Font Families ── */\n  --font-display:   'Satoshi', 'Inter', sans-serif;   /* Titles, display, hero */\n  --font-interface: 'Inter', sans-serif;               /* Body, labels, UI text */\n  --font-data:      'DM Mono', monospace;              /* Numbers, metrics, code */\n\n  /* ── Type Scale ── */\n  --text-xs:   0.75rem;    /* 12px — captions, timestamps */\n  --text-sm:   0.875rem;   /* 14px — secondary labels, metadata */\n  --text-base: 1rem;       /* 16px — body text */\n  --text-lg:   1.25rem;    /* 20px — section labels, subheadings */\n  --text-xl:   1.5rem;     /* 24px — card titles, feature headers */\n  --text-2xl:  2rem;       /* 32px — section headings */\n  --text-3xl:  3rem;       /* 48px — hero, display, splash */\n\n  /* ── Line Heights ── */\n  --leading-tight:   1.1;\n  --leading-snug:    1.3;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  /* ── Letter Spacing ── */\n  --tracking-tight:  -0.03em;   /* Display titles */\n  --tracking-normal: -0.01em;   /* Body text */\n  --tracking-caps:    0.08em;   /* Section labels (uppercase) */\n  --tracking-wide:    0.12em;   /* Small caps, badges */\n\n  /* ── Font Weights ── */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semi:    600;\n  --weight-bold:    700;\n  --weight-black:   800;\n}\n<\u002Fstyle>\n  <style>/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Color Tokens\n   Rule: Blue is the system. Amber is the reward. Never invert.\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Backgrounds / Surfaces ── */\n  --color-base:              #0F2F3C;   /* Page background. Never white. */\n  --color-surface:           #0A1C24;   /* Cards, panels, side-nav */\n  --color-surface-elevated:  #08171D;   /* Elevated cards, dropdowns, tooltips */\n  --color-surface-overlay:   rgba(10, 28, 36, 0.70);  /* Modal/sheet scrim */\n\n  /* ── Blue — The System ──\n     Primary actions, active states, data accents, links.\n     Never use for achievements or gamification. */\n  --color-blue-core:   #0F2F3C;\n  --color-blue-glow:   #6DA4B7;\n  --color-blue-deep:   #122229;\n  --color-blue-dim:    rgba(109, 164, 183, 0.20);\n  --color-blue-subtle: rgba(109, 164, 183, 0.08);\n\n  /* ── Amber — The Reward ──\n     Streaks, achievements, gamification ONLY.\n     Never use for primary actions, links, or system UI. */\n  --color-amber:         #FFB23A;\n  --color-amber-warm:    #FF8A00;\n  --color-amber-dim:     rgba(255, 178, 58, 0.20);\n  --color-amber-subtle:  rgba(255, 178, 58, 0.08);\n\n  /* ── Text ── */\n  --color-text:          #E8ECF4;   /* Body text, headings */\n  --color-text-muted:    #759AA7;   /* Labels, captions, secondary */\n  --color-text-disabled: #5D8898;   /* Disabled states */\n\n  /* ── Status ── */\n  --color-success:  #2ECC71;\n  --color-error:    #FF4B4B;\n  --color-info:     var(--color-blue-core);\n  --color-warning:  var(--color-amber);\n\n  /* ── Semantic Aliases ── */\n  --color-bg:             var(--color-base);\n  --color-card:           var(--color-surface);\n  --color-card-elevated:  var(--color-surface-elevated);\n  --color-accent:         var(--color-blue-core);\n  --color-accent-light:   var(--color-blue-glow);\n  --color-reward:         var(--color-amber);\n  --color-fg:             var(--color-text);\n  --color-fg-muted:       var(--color-text-muted);\n  --color-fg-disabled:    var(--color-text-disabled);\n\n  /* ── Brand Gradients ── */\n  --gradient-bg-glow: radial-gradient(\n    ellipse 80% 50% at 50% 100%,\n    rgba(109, 164, 183, 0.18) 0%,\n    rgba(18, 34, 41, 0.10) 40%,\n    transparent 70%\n  ); /* @kind color */\n  --gradient-amber-glow: radial-gradient(\n    ellipse 60% 40% at 50% 50%,\n    rgba(255, 178, 58, 0.30) 0%,\n    rgba(255, 138, 0, 0.12) 50%,\n    transparent 75%\n  ); /* @kind color */\n  --gradient-blue-radial: radial-gradient(\n    circle at 50% 50%,\n    var(--color-blue-core) 0%,\n    var(--color-blue-deep) 50%,\n    transparent 100%\n  ); /* @kind color */\n}\n<\u002Fstyle>\n  <style>/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Spacing, Radius & Z-Index Tokens\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Spacing — Base-4 Scale ── */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* ── Border Radius ── */\n  --radius-sm:   6px;      /* Badges, tags, small chips */\n  --radius-md:  12px;      /* Cards, inputs, buttons */\n  --radius-lg:  16px;      /* Large panels, sheets, modal corners */\n  --radius-full: 9999px;   /* Pills, avatar circles, toggles */\n\n  /* ── Z-Index Scale ── */\n  --z-base:    0;    /* @kind other */\n  --z-raised: 10;    /* @kind other */\n  --z-sticky: 50;    /* @kind other */\n  --z-overlay: 100;  /* @kind other */\n  --z-modal:   200;  /* @kind other */\n  --z-toast:   300;  /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Effects Tokens\n   Glass morphism, shadows, glows, and transitions\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Glass Backgrounds ── */\n  --glass-bg:          rgba(12, 28, 34, 0.70); /* @kind color */\n  --glass-bg-elevated: rgba(15, 47, 60, 0.70);  /* @kind color */\n  --glass-bg-streak:   rgba(20, 12, 4, 0.80);  /* @kind color */\n\n  /* ── Glass Blur ── */\n  --glass-blur:          blur(12px);   /* @kind other */\n  --glass-blur-elevated: blur(20px);   /* @kind other */\n\n  /* ── Glass Borders ── */\n  --glass-border:          1px solid rgba(109, 164, 183, 0.15); /* @kind other */\n  --glass-border-elevated: 1px solid rgba(109, 164, 183, 0.25); /* @kind other */\n  --glass-border-streak:   1px solid rgba(255, 178, 58, 0.25);   /* @kind other */\n\n  /* ── Shadows ── */\n  --shadow-sm:       0 1px 6px rgba(0, 0, 0, 0.30);\n  --shadow-card:     0 2px 16px rgba(0, 0, 0, 0.40),\n                     0 1px 4px rgba(0, 0, 0, 0.20);\n  --shadow-elevated: 0 8px 48px rgba(0, 0, 0, 0.60),\n                     0 2px 12px rgba(0, 0, 0, 0.30);\n\n  /* ── Blue Glows ── */\n  --glow-blue:        0 0 20px rgba(109, 164, 183, 0.30),\n                      0 0 40px rgba(109, 164, 183, 0.12); /* @kind shadow */\n  --glow-blue-strong: 0 0 30px rgba(109, 164, 183, 0.50),\n                      0 0 60px rgba(109, 164, 183, 0.22); /* @kind shadow */\n  --glow-blue-inset:  inset 0 0 20px rgba(109, 164, 183, 0.10); /* @kind shadow */\n\n  /* ── Amber Glows ── */\n  --glow-amber:        0 0 20px rgba(255, 178, 58, 0.40),\n                       0 0 40px rgba(255, 178, 58, 0.18); /* @kind shadow */\n  --glow-amber-strong: 0 0 30px rgba(255, 178, 58, 0.60),\n                       0 0 60px rgba(255, 178, 58, 0.28); /* @kind shadow */\n\n  /* ── Transitions ── */\n  --ease-out:    cubic-bezier(0.2, 0, 0, 1);             /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);      /* @kind other */\n  --ease-in:     cubic-bezier(0.4, 0, 1, 1);             /* @kind other */\n\n  --transition-fast:   150ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-base:   250ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-slow:   400ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-spring: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);     /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk Design System — 02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Font Families ── */\n  --font-display:   'Satoshi', 'Inter', sans-serif;   /* Titles, display, hero */\n  --font-interface: 'Inter', sans-serif;               /* Body, labels, UI text */\n  --font-data:      'DM Mono', monospace;              /* Numbers, metrics, code */\n\n  /* ── Type Scale ── */\n  --text-xs:   0.75rem;    /* 12px — captions, timestamps */\n  --text-sm:   0.875rem;   /* 14px — secondary labels, metadata */\n  --text-base: 1rem;       /* 16px — body text */\n  --text-lg:   1.25rem;    /* 20px — section labels, subheadings */\n  --text-xl:   1.5rem;     /* 24px — card titles, feature headers */\n  --text-2xl:  2rem;       /* 32px — section headings */\n  --text-3xl:  3rem;       /* 48px — hero, display, splash */\n\n  /* ── Line Heights ── */\n  --leading-tight:   1.1;\n  --leading-snug:    1.3;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  /* ── Letter Spacing ── */\n  --tracking-tight:  -0.03em;   /* Display titles */\n  --tracking-normal: -0.01em;   /* Body text */\n  --tracking-caps:    0.08em;   /* Section labels (uppercase) */\n  --tracking-wide:    0.12em;   /* Small caps, badges */\n\n  /* ── Font Weights ── */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-semi:    600;\n  --weight-bold:    700;\n  --weight-black:   800;\n}\n\n/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Color Tokens\n   Rule: Blue is the system. Amber is the reward. Never invert.\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Backgrounds / Surfaces ── */\n  --color-base:              #0F2F3C;   /* Page background. Never white. */\n  --color-surface:           #0A1C24;   /* Cards, panels, side-nav */\n  --color-surface-elevated:  #08171D;   /* Elevated cards, dropdowns, tooltips */\n  --color-surface-overlay:   rgba(10, 28, 36, 0.70);  /* Modal/sheet scrim */\n\n  /* ── Blue — The System ──\n     Primary actions, active states, data accents, links.\n     Never use for achievements or gamification. */\n  --color-blue-core:   #0F2F3C;\n  --color-blue-glow:   #6DA4B7;\n  --color-blue-deep:   #122229;\n  --color-blue-dim:    rgba(109, 164, 183, 0.20);\n  --color-blue-subtle: rgba(109, 164, 183, 0.08);\n\n  /* ── Amber — The Reward ──\n     Streaks, achievements, gamification ONLY.\n     Never use for primary actions, links, or system UI. */\n  --color-amber:         #FFB23A;\n  --color-amber-warm:    #FF8A00;\n  --color-amber-dim:     rgba(255, 178, 58, 0.20);\n  --color-amber-subtle:  rgba(255, 178, 58, 0.08);\n\n  /* ── Text ── */\n  --color-text:          #E8ECF4;   /* Body text, headings */\n  --color-text-muted:    #759AA7;   /* Labels, captions, secondary */\n  --color-text-disabled: #5D8898;   /* Disabled states */\n\n  /* ── Status ── */\n  --color-success:  #2ECC71;\n  --color-error:    #FF4B4B;\n  --color-info:     var(--color-blue-core);\n  --color-warning:  var(--color-amber);\n\n  /* ── Semantic Aliases ── */\n  --color-bg:             var(--color-base);\n  --color-card:           var(--color-surface);\n  --color-card-elevated:  var(--color-surface-elevated);\n  --color-accent:         var(--color-blue-core);\n  --color-accent-light:   var(--color-blue-glow);\n  --color-reward:         var(--color-amber);\n  --color-fg:             var(--color-text);\n  --color-fg-muted:       var(--color-text-muted);\n  --color-fg-disabled:    var(--color-text-disabled);\n\n  /* ── Brand Gradients ── */\n  --gradient-bg-glow: radial-gradient(\n    ellipse 80% 50% at 50% 100%,\n    rgba(109, 164, 183, 0.18) 0%,\n    rgba(18, 34, 41, 0.10) 40%,\n    transparent 70%\n  ); /* @kind color */\n  --gradient-amber-glow: radial-gradient(\n    ellipse 60% 40% at 50% 50%,\n    rgba(255, 178, 58, 0.30) 0%,\n    rgba(255, 138, 0, 0.12) 50%,\n    transparent 75%\n  ); /* @kind color */\n  --gradient-blue-radial: radial-gradient(\n    circle at 50% 50%,\n    var(--color-blue-core) 0%,\n    var(--color-blue-deep) 50%,\n    transparent 100%\n  ); /* @kind color */\n}\n\n/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Spacing, Radius & Z-Index Tokens\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Spacing — Base-4 Scale ── */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* ── Border Radius ── */\n  --radius-sm:   6px;      /* Badges, tags, small chips */\n  --radius-md:  12px;      /* Cards, inputs, buttons */\n  --radius-lg:  16px;      /* Large panels, sheets, modal corners */\n  --radius-full: 9999px;   /* Pills, avatar circles, toggles */\n\n  /* ── Z-Index Scale ── */\n  --z-base:    0;    /* @kind other */\n  --z-raised: 10;    /* @kind other */\n  --z-sticky: 50;    /* @kind other */\n  --z-overlay: 100;  /* @kind other */\n  --z-modal:   200;  /* @kind other */\n  --z-toast:   300;  /* @kind other */\n}\n\n/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n   Nūtrk — Effects Tokens\n   Glass morphism, shadows, glows, and transitions\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */\n\n:root {\n  /* ── Glass Backgrounds ── */\n  --glass-bg:          rgba(12, 28, 34, 0.70); /* @kind color */\n  --glass-bg-elevated: rgba(15, 47, 60, 0.70);  /* @kind color */\n  --glass-bg-streak:   rgba(20, 12, 4, 0.80);  /* @kind color */\n\n  /* ── Glass Blur ── */\n  --glass-blur:          blur(12px);   /* @kind other */\n  --glass-blur-elevated: blur(20px);   /* @kind other */\n\n  /* ── Glass Borders ── */\n  --glass-border:          1px solid rgba(109, 164, 183, 0.15); /* @kind other */\n  --glass-border-elevated: 1px solid rgba(109, 164, 183, 0.25); /* @kind other */\n  --glass-border-streak:   1px solid rgba(255, 178, 58, 0.25);   /* @kind other */\n\n  /* ── Shadows ── */\n  --shadow-sm:       0 1px 6px rgba(0, 0, 0, 0.30);\n  --shadow-card:     0 2px 16px rgba(0, 0, 0, 0.40),\n                     0 1px 4px rgba(0, 0, 0, 0.20);\n  --shadow-elevated: 0 8px 48px rgba(0, 0, 0, 0.60),\n                     0 2px 12px rgba(0, 0, 0, 0.30);\n\n  /* ── Blue Glows ── */\n  --glow-blue:        0 0 20px rgba(109, 164, 183, 0.30),\n                      0 0 40px rgba(109, 164, 183, 0.12); /* @kind shadow */\n  --glow-blue-strong: 0 0 30px rgba(109, 164, 183, 0.50),\n                      0 0 60px rgba(109, 164, 183, 0.22); /* @kind shadow */\n  --glow-blue-inset:  inset 0 0 20px rgba(109, 164, 183, 0.10); /* @kind shadow */\n\n  /* ── Amber Glows ── */\n  --glow-amber:        0 0 20px rgba(255, 178, 58, 0.40),\n                       0 0 40px rgba(255, 178, 58, 0.18); /* @kind shadow */\n  --glow-amber-strong: 0 0 30px rgba(255, 178, 58, 0.60),\n                       0 0 60px rgba(255, 178, 58, 0.28); /* @kind shadow */\n\n  /* ── Transitions ── */\n  --ease-out:    cubic-bezier(0.2, 0, 0, 1);             /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);      /* @kind other */\n  --ease-in:     cubic-bezier(0.4, 0, 1, 1);             /* @kind other */\n\n  --transition-fast:   150ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-base:   250ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-slow:   400ms cubic-bezier(0.2, 0, 0, 1);            /* @kind other */\n  --transition-spring: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);     /* @kind other */\n}\n\n<\u002Fstyle>\n\n  <script src=\"c35acdae-4436-4fdd-8e04-69067fb79ff8\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n  <script src=\"dcabd93c-7521-4202-a424-0545270a8ead\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n\n  <script src=\"ea9467d5-c628-472e-b9e1-c25c7ff0342f\"><\u002F
